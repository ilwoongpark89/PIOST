<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <style>
      .cls-red { fill: #B22234; }
      .cls-blue { fill: #1B365D; }
      .cls-flame { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- P -->
  <path class="cls-red" d="M 50 50 L 50 250 L 90 250 L 90 160 L 150 160 Q 200 160 200 110 Q 200 50 150 50 Z M 90 90 L 140 90 Q 160 90 160 110 Q 160 130 140 130 L 90 130 Z"/>

  <!-- I -->
  <path class="cls-red" d="M 230 50 L 230 250 L 270 250 L 270 50 Z"/>

  <!-- Ø Circle -->
  <circle class="cls-red" cx="400" cy="150" r="100" fill="none" stroke="#B22234" stroke-width="40"/>

  <!-- Flame Icon inside Ø -->
  <g transform="translate(400, 150)">
    <!-- Main flame -->
    <path class="cls-flame" d="M 0 -45 Q -15 -30 -15 -10 Q -15 5 -10 15 Q -5 25 0 30 Q 5 25 10 15 Q 15 5 15 -10 Q 15 -30 0 -45 Z"/>
    <!-- Inner flame -->
    <path class="cls-flame" d="M 0 -30 Q -8 -20 -8 -8 Q -8 0 -5 8 Q -2 12 0 15 Q 2 12 5 8 Q 8 0 8 -8 Q 8 -20 0 -30 Z" opacity="0.7"/>
    <!-- Small flame tip -->
    <path class="cls-flame" d="M 0 -20 Q -4 -15 -4 -5 Q -4 0 0 5 Q 4 0 4 -5 Q 4 -15 0 -20 Z" opacity="0.5"/>
  </g>

  <!-- Diagonal line through Ø -->
  <line x1="330" y1="80" x2="470" y2="220" stroke="#B22234" stroke-width="40" stroke-linecap="round"/>

  <!-- S -->
  <path class="cls-blue" d="M 650 60 Q 550 60 550 100 Q 550 130 600 140 L 680 155 Q 710 160 710 180 Q 710 200 680 200 L 570 200 Q 540 200 540 230 L 700 230 Q 750 230 750 180 Q 750 150 700 140 L 620 125 Q 590 120 590 100 Q 590 90 620 90 L 720 90 Q 750 90 750 60 Z"/>

  <!-- T -->
  <path class="cls-blue" d="M 790 50 L 790 90 L 840 90 L 840 250 L 880 250 L 880 90 L 930 90 L 930 50 Z"/>
</svg>
